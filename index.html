<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0e0e0e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>wordvault</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --border2: #333;
  --text: #f0ede6;
  --muted: #666;
  --muted2: #888;
  --accent: #c8b89a;
  --accent2: #e8d5b7;
  --tag-bg: #1e1a14;
  --tag-border: #3a3020;
  --tag-text: #c8a96e;
  --danger: #8b3a3a;
  --mono: 'DM Mono', monospace;
  --display: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; }

/* layout */
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 540px; margin: 0 auto; }

/* header */
.header { padding: 20px 20px 0; flex-shrink: 0; }
.header-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; }
.logo { font-family: var(--display); font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); line-height: 1; }
.logo span { color: var(--accent); }
.header-meta { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.drive-status { display: flex; align-items: center; gap: 5px; font-size: 11px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
.dot.connected { background: #4caf7d; }
.dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* search */
.search-wrap { padding: 12px 20px; flex-shrink: 0; }
.search-inner { position: relative; }
.search-inner input { width: 100%; background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 36px 10px 12px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
.search-inner input:focus { border-color: var(--border2); }
.search-inner input::placeholder { color: var(--muted); }
.search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 4px; display: none; }

/* list */
.list-wrap { flex: 1; overflow-y: auto; padding: 0 20px 10px; scrollbar-width: none; }
.list-wrap::-webkit-scrollbar { display: none; }
.word-count { font-size: 11px; color: var(--muted); margin-bottom: 12px; letter-spacing: 0.04em; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 8px; }
.empty-state .big { font-family: var(--display); font-size: 40px; font-weight: 800; color: var(--surface2); }
.empty-state .sub { font-size: 12px; color: var(--muted); }
.word-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 14px 14px 12px; margin-bottom: 10px; position: relative; transition: border-color 0.2s; }
.word-card:active { border-color: var(--border2); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
.card-word { font-family: var(--display); font-size: 19px; font-weight: 700; color: var(--accent2); letter-spacing: -0.2px; line-height: 1.1; }
.card-delete { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; margin-top: 2px; }
.card-delete:active { color: var(--danger); }
.card-film { display: inline-flex; align-items: center; gap: 5px; background: var(--tag-bg); border: 0.5px solid var(--tag-border); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--tag-text); letter-spacing: 0.02em; margin-bottom: 8px; }
.card-def { font-size: 13px; color: var(--muted2); line-height: 1.65; }
.card-quote { font-size: 12px; color: var(--muted); line-height: 1.6; margin-top: 8px; padding-left: 10px; border-left: 1.5px solid var(--border2); font-style: italic; }
.card-date { font-size: 10px; color: var(--muted); margin-top: 8px; letter-spacing: 0.04em; }

/* bottom add bar */
.add-bar { flex-shrink: 0; padding: 10px 20px 20px; border-top: 0.5px solid var(--border); background: var(--bg); }
.add-btn-main { width: 100%; background: var(--accent); border: none; border-radius: 8px; padding: 13px; font-family: var(--display); font-size: 15px; font-weight: 700; color: #0e0e0e; cursor: pointer; letter-spacing: 0.01em; transition: opacity 0.2s; }
.add-btn-main:active { opacity: 0.85; }

/* modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 16px 16px 0 0; padding: 20px 20px 32px; width: 100%; max-width: 540px; animation: slideup 0.25s ease; }
@keyframes slideup { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { width: 36px; height: 3px; background: var(--border2); border-radius: 99px; margin: 0 auto 18px; }
.modal-title { font-family: var(--display); font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.field { margin-bottom: 14px; }
.field label { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; display: block; margin-bottom: 6px; }
.field input, .field textarea { width: 100%; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: var(--mono); font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; }
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field input::placeholder, .field textarea::placeholder { color: var(--muted); }
.field textarea { resize: none; line-height: 1.6; }
.def-row { display: flex; gap: 8px; }
.def-row textarea { flex: 1; }
.fetch-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: var(--mono); font-size: 11px; color: var(--muted2); cursor: pointer; white-space: nowrap; letter-spacing: 0.02em; transition: border-color 0.2s, color 0.2s; align-self: flex-start; }
.fetch-btn:active { border-color: var(--accent); color: var(--accent); }
.fetch-status { font-size: 11px; color: var(--muted); margin-top: 4px; min-height: 14px; }
.modal-actions { display: flex; gap: 10px; margin-top: 4px; }
.btn-cancel { flex: 1; background: none; border: 0.5px solid var(--border); border-radius: 8px; padding: 12px; font-family: var(--mono); font-size: 13px; color: var(--muted2); cursor: pointer; }
.btn-save { flex: 2; background: var(--accent); border: none; border-radius: 8px; padding: 12px; font-family: var(--display); font-size: 14px; font-weight: 700; color: #0e0e0e; cursor: pointer; }
.btn-save:active { opacity: 0.85; }

/* drive modal */
.drive-modal { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 16px 16px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 540px; animation: slideup 0.25s ease; }
.drive-modal h3 { font-family: var(--display); font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.drive-modal p { font-size: 12px; color: var(--muted2); line-height: 1.6; margin-bottom: 20px; }
.drive-input-wrap { margin-bottom: 14px; }
.drive-input-wrap label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
.drive-input-wrap input { width: 100%; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; }
.drive-input-wrap input:focus { border-color: var(--accent); }
.drive-note { font-size: 11px; color: var(--muted); line-height: 1.6; margin-bottom: 18px; background: var(--surface2); border-radius: 8px; padding: 10px 12px; border-left: 2px solid var(--accent); }
.btn-connect { width: 100%; background: var(--accent); border: none; border-radius: 8px; padding: 13px; font-family: var(--display); font-size: 15px; font-weight: 700; color: #0e0e0e; cursor: pointer; margin-bottom: 10px; }
.btn-drive-cancel { width: 100%; background: none; border: 0.5px solid var(--border); border-radius: 8px; padding: 12px; font-family: var(--mono); font-size: 13px; color: var(--muted2); cursor: pointer; }
.connected-info { background: var(--surface2); border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 12px; color: var(--muted2); line-height: 1.7; }
.connected-info strong { color: var(--accent); font-weight: 400; }
.btn-disconnect { width: 100%; background: none; border: 0.5px solid var(--danger); border-radius: 8px; padding: 12px; font-family: var(--mono); font-size: 13px; color: var(--danger); cursor: pointer; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">word<span>vault</span></div>
      <div class="header-meta">
        <div class="drive-status" id="drive-status-bar" onclick="openDriveModal()" style="cursor:pointer;">
          <div class="dot" id="drive-dot"></div>
          <span id="drive-label">connect drive</span>
        </div>
        <span id="total-count" style="font-size:11px; color:var(--muted);">0 words</span>
      </div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-inner">
      <input type="text" id="search-input" placeholder="search words, films..." oninput="renderList()" />
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="list-wrap" id="list-wrap">
    <div class="word-count" id="word-count" style="display:none;"></div>
    <div id="word-list"></div>
  </div>

  <div class="add-bar">
    <button class="add-btn-main" onclick="openAddModal()">+ add word</button>
  </div>
</div>

<!-- Add Word Modal -->
<div class="modal-overlay" id="add-modal" onclick="handleModalClick(event)">
  <div class="modal" id="add-modal-inner">
    <div class="modal-handle"></div>
    <div class="modal-title">new word</div>
    <div class="field">
      <label>word</label>
      <input type="text" id="inp-word" placeholder="e.g. ephemeral" oninput="onWordInput()" />
    </div>
    <div class="field">
      <label>meaning</label>
      <div class="def-row">
        <textarea id="inp-def" rows="3" placeholder="definition will appear here..."></textarea>
        <button class="fetch-btn" onclick="fetchDef()" id="fetch-btn">auto↗</button>
      </div>
      <div class="fetch-status" id="fetch-status"></div>
    </div>
    <div class="field">
      <label>quote from film</label>
      <textarea id="inp-quote" rows="2" placeholder="the line it was used in..."></textarea>
    </div>
    <div class="field">
      <label>from film</label>
      <input type="text" id="inp-film" placeholder="e.g. Arrival (2016)" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">cancel</button>
      <button class="btn-save" onclick="saveWord()">save</button>
    </div>
  </div>
</div>

<!-- Drive Modal -->
<div class="modal-overlay" id="drive-modal" onclick="handleDriveModalClick(event)">
  <div class="drive-modal" id="drive-modal-inner">
    <div class="modal-handle"></div>
    <div id="drive-modal-content"></div>
  </div>
</div>

<script>
// ─── state ───────────────────────────────────────────────
let words = [];
let driveConfig = null; // { apiKey, fileId, fileName }

const LS_WORDS = 'wv_words_v1';
const LS_DRIVE = 'wv_drive_v1';

// ─── init ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const raw = localStorage.getItem(LS_WORDS);
  if (raw) try { words = JSON.parse(raw); } catch(e) {}
  const driveRaw = localStorage.getItem(LS_DRIVE);
  if (driveRaw) try { driveConfig = JSON.parse(driveRaw); } catch(e) {}
  updateDriveStatus();
  renderList();
  if (driveConfig) syncFromDrive();
});

// ─── local save ───────────────────────────────────────────
function localSave() {
  localStorage.setItem(LS_WORDS, JSON.stringify(words));
}

// ─── render ───────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const clearBtn = document.getElementById('search-clear');
  clearBtn.style.display = q ? 'block' : 'none';

  const filtered = q
    ? words.filter(w =>
        w.word.toLowerCase().includes(q) ||
        (w.film || '').toLowerCase().includes(q) ||
        (w.def || '').toLowerCase().includes(q))
    : [...words];

  const countEl = document.getElementById('word-count');
  const totalEl = document.getElementById('total-count');
  totalEl.textContent = words.length + (words.length === 1 ? ' word' : ' words');

  if (q) {
    countEl.style.display = 'block';
    countEl.textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''} for "${q}"`;
  } else {
    countEl.style.display = 'none';
  }

  const list = document.getElementById('word-list');
  if (words.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="big">W</div><div class="sub">no words yet — add your first one</div></div>`;
    return;
  }
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="big">?</div><div class="sub">no matches</div></div>`;
    return;
  }

  list.innerHTML = filtered.map(w => `
    <div class="word-card">
      <div class="card-top">
        <div class="card-word">${escHtml(w.word)}</div>
        <button class="card-delete" onclick="deleteWord(${w.id})">✕</button>
      </div>
      ${w.film ? `<div class="card-film">⬡ ${escHtml(w.film)}</div>` : ''}
      <div class="card-def">${escHtml(w.def || '—')}</div>
      ${w.quote ? `<div class="card-quote">"${escHtml(w.quote)}"</div>` : ''}
      <div class="card-date">${w.date}</div>
    </div>
  `).join('');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  renderList();
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── add modal ────────────────────────────────────────────
function openAddModal() {
  document.getElementById('inp-word').value = '';
  document.getElementById('inp-def').value = '';
  document.getElementById('inp-quote').value = '';
  document.getElementById('inp-film').value = '';
  document.getElementById('fetch-status').textContent = '';
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('inp-word').focus(), 300);
}
function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}
function handleModalClick(e) {
  if (e.target === document.getElementById('add-modal')) closeAddModal();
}

let fetchTimer = null;
function onWordInput() {
  clearTimeout(fetchTimer);
  fetchTimer = setTimeout(() => {
    if (document.getElementById('inp-word').value.trim().length > 2) fetchDef();
  }, 700);
}

async function fetchDef() {
  const word = document.getElementById('inp-word').value.trim();
  if (!word) return;
  const statusEl = document.getElementById('fetch-status');
  statusEl.textContent = 'fetching...';
  try {
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    const meanings = data[0]?.meanings;
    if (!meanings?.length) throw new Error('no def');
    const def = meanings[0].definitions[0].definition;
    document.getElementById('inp-def').value = def;
    statusEl.textContent = '✓ fetched — edit freely';
    setTimeout(() => statusEl.textContent = '', 2500);
  } catch(e) {
    statusEl.textContent = 'not found — type it manually';
    setTimeout(() => statusEl.textContent = '', 2500);
  }
}

async function saveWord() {
  const word = document.getElementById('inp-word').value.trim();
  const def = document.getElementById('inp-def').value.trim();
  const quote = document.getElementById('inp-quote').value.trim();
  const film = document.getElementById('inp-film').value.trim();
  if (!word) { document.getElementById('inp-word').focus(); return; }
  const entry = {
    id: Date.now(),
    word,
    def,
    quote,
    film,
    date: new Date().toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
  };
  words.unshift(entry);
  localSave();
  closeAddModal();
  renderList();
  if (driveConfig) syncToDrive();
}

function deleteWord(id) {
  if (!confirm('remove this word?')) return;
  words = words.filter(w => w.id !== id);
  localSave();
  renderList();
  if (driveConfig) syncToDrive();
}

// ─── google drive sync ────────────────────────────────────
// uses Google Drive REST API v3 with API Key + manual OAuth token
// user pastes their API key + OAuth token from Google OAuth Playground

function updateDriveStatus(state) {
  const dot = document.getElementById('drive-dot');
  const label = document.getElementById('drive-label');
  dot.className = 'dot';
  if (state === 'syncing') { dot.classList.add('syncing'); label.textContent = 'syncing...'; }
  else if (driveConfig) { dot.classList.add('connected'); label.textContent = 'drive ✓'; }
  else { label.textContent = 'connect drive'; }
}

function openDriveModal() {
  const content = document.getElementById('drive-modal-content');
  if (driveConfig) {
    content.innerHTML = `
      <h3>google drive</h3>
      <div class="connected-info">
        connected<br>
        <strong>file: ${escHtml(driveConfig.fileName || 'wordvault.json')}</strong><br>
        words sync automatically when you add or delete.
      </div>
      <button class="btn-connect" onclick="manualSync()">sync now</button>
      <button class="btn-disconnect" onclick="disconnectDrive()">disconnect</button>
      <button class="btn-drive-cancel" onclick="closeDriveModal()">close</button>
    `;
  } else {
    content.innerHTML = `
      <h3>connect google drive</h3>
      <p>your words will be saved to a file in your google drive so you never lose them.</p>
      <div class="drive-note">
        you'll need a free OAuth token from google. open <strong>oauth2.googleapis.com/token</strong> or use the Google OAuth Playground at <strong>developers.google.com/oauthplayground</strong> — select Drive API v3 scope, then paste the access token below.
      </div>
      <div class="drive-input-wrap">
        <label>oauth access token</label>
        <input type="text" id="drive-token-inp" placeholder="paste your access token..." />
      </div>
      <div class="drive-input-wrap">
        <label>file name (optional)</label>
        <input type="text" id="drive-filename-inp" placeholder="wordvault.json" />
      </div>
      <button class="btn-connect" onclick="connectDrive()">connect</button>
      <button class="btn-drive-cancel" onclick="closeDriveModal()">cancel</button>
    `;
  }
  document.getElementById('drive-modal').classList.add('open');
}

function closeDriveModal() {
  document.getElementById('drive-modal').classList.remove('open');
}
function handleDriveModalClick(e) {
  if (e.target === document.getElementById('drive-modal')) closeDriveModal();
}

async function connectDrive() {
  const token = document.getElementById('drive-token-inp').value.trim();
  const fileName = document.getElementById('drive-filename-inp').value.trim() || 'wordvault.json';
  if (!token) { alert('paste your access token first'); return; }
  updateDriveStatus('syncing');
  // try to find existing file
  try {
    const searchRes = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${fileName}'+and+trashed=false&fields=files(id,name)`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const searchData = await searchRes.json();
    let fileId;
    if (searchData.files && searchData.files.length > 0) {
      fileId = searchData.files[0].id;
      // load from drive
      const contentRes = await fetch(
        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      const existingWords = await contentRes.json();
      if (Array.isArray(existingWords)) words = existingWords;
    } else {
      // create new file
      const meta = { name: fileName, mimeType: 'application/json' };
      const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(meta)
      });
      const createData = await createRes.json();
      fileId = createData.id;
      await uploadToDrive(token, fileId);
    }
    driveConfig = { token, fileId, fileName };
    localStorage.setItem(LS_DRIVE, JSON.stringify(driveConfig));
    localSave();
    renderList();
    updateDriveStatus();
    closeDriveModal();
  } catch(e) {
    alert('connection failed — check your token and try again');
    updateDriveStatus();
  }
}

async function uploadToDrive(token, fileId) {
  await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method: 'PATCH',
    headers: {
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(words)
  });
}

async function syncToDrive() {
  if (!driveConfig) return;
  updateDriveStatus('syncing');
  try {
    await uploadToDrive(driveConfig.token, driveConfig.fileId);
    updateDriveStatus();
  } catch(e) {
    updateDriveStatus();
  }
}

async function syncFromDrive() {
  if (!driveConfig) return;
  updateDriveStatus('syncing');
  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files/${driveConfig.fileId}?alt=media`,
      { headers: { Authorization: `Bearer ${driveConfig.token}` } }
    );
    const data = await res.json();
    if (Array.isArray(data)) { words = data; localSave(); renderList(); }
    updateDriveStatus();
  } catch(e) {
    updateDriveStatus();
  }
}

async function manualSync() {
  closeDriveModal();
  await syncFromDrive();
}

function disconnectDrive() {
  if (!confirm('disconnect google drive? your words will stay on this device.')) return;
  driveConfig = null;
  localStorage.removeItem(LS_DRIVE);
  updateDriveStatus();
  closeDriveModal();
}
</script>
</body>
</html>
